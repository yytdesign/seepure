<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections - Seepure</title>

<style>
:root{--bg:#0b0d0e;--card:#111416;--text:#fff;--muted:#a7b0b3}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text)}

/* NAV */
header{
  position:fixed;inset:0 0 auto 0;
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;
  background:rgba(10,12,13,.5);
  backdrop-filter:blur(12px);
  z-index:20
}
.logo{letter-spacing:3px;font-size:14px}
nav a{margin-left:16px;color:#fff;text-decoration:none;font-size:13px;opacity:.85}
nav a:hover{opacity:.6}

/* HERO */
.hero{
  height:50vh;
  background:url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=1600&fm=jpg') center/cover no-repeat;
  position:relative
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,.6),rgba(10,60,62,.5))
}
.hero-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:2;text-align:center
}
.hero h1{font-size:36px;margin:0}
.hero p{color:var(--muted)}

/* SECTION */
.section{padding:60px 24px}
.grid{
  display:grid;
  gap:18px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr))
}

/* CARD */
.card{
  position:relative;height:260px;border-radius:12px;
  overflow:hidden;cursor:pointer;
  transition:.4s
}
.card:hover{transform:translateY(-6px)}
.card img{
  width:100%;height:100%;object-fit:cover;
  transition:.6s
}
.card:hover img{transform:scale(1.1)}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent 60%)
}
.card span{
  position:absolute;left:14px;bottom:14px;
  z-index:2;font-size:13px
}

footer{padding:30px;text-align:center;color:#666}
</style>
</head>

<body>

<header>
  <div class="logo">SEEPURE</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="#">About</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Collections</h1>
    <p>Explore our marble series</p>
  </div>
</section>

<!-- DINING -->
<section class="section">
  <h2>Dining</h2>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?q=80&w=800&fm=jpg">
      <span>Marble Table</span>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9?q=80&w=800&fm=jpg">
      <span>Serving Tray</span>
    </div>
  </div>
</section>

<!-- BATH -->
<section class="section">
  <h2>Bath</h2>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?q=80&w=800&fm=jpg">
      <span>Marble Sink</span>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=800&fm=jpg">
      <span>Soap Dispenser</span>
    </div>
  </div>
</section>

<footer>© 2026 Seepure</footer>

</body>
</html>
