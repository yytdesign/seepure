<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seepure</title>
<style>
:root{
  --bg:#0b0d0e;
  --card:#111416;
  --text:#ffffff;
  --muted:#a7b0b3;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed; inset:0 0 auto 0;
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 40px; z-index:20;
  background:rgba(10,12,13,.45); backdrop-filter: blur(12px);
}
header .logo{letter-spacing:3px; font-size:14px}
header nav a{
  margin-left:22px; color:#fff; text-decoration:none; font-size:13px; opacity:.85;
}
header nav a:hover{opacity:.6}

/* HERO */
.hero{height:60vh; position:relative; overflow:hidden}
.slide{
  position:absolute; inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(1.05) translateY(0px);
  transition:opacity 1.2s ease, transform 12s ease;
  will-change:opacity, transform;
}
.slide.active{
  opacity:1;
  transform:scale(1.1) translateY(-10px);
}
.hero::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(0,0,0,.5), rgba(10,60,62,.55));
}
.hero-content{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2;
  animation:fadeInText 1.2s ease forwards;
  opacity:0;
}
.hero h1{font-size:48px; letter-spacing:4px; margin:0}
.hero p{margin-top:14px; color:var(--muted)}
@keyframes fadeInText{
  0%{opacity:0; transform:translateY(20px)}
  100%{opacity:1; transform:translateY(0)}
}

/* SECTIONS */
.section{padding:90px 40px; opacity:0; transform:translateY(40px); transition:.8s}
.section.visible{opacity:1; transform:translateY(0)}
.section h2{font-weight:500; margin-bottom:30px}

/* GRID */
.grid{
  display:grid; gap:22px;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}
.card{
  position:relative; height:320px; border-radius:14px; overflow:hidden; cursor:pointer;
  background:var(--card);
  transform:translateY(0px);
  transition:transform 0.6s ease;
}
.card:hover{transform:translateY(-6px)}
.card::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.6), transparent 65%);
  transition:background 0.6s ease;
}
.card img{
  width:100%; height:100%; object-fit:cover;
  filter:brightness(.85) contrast(1.1);
  transition:transform .8s ease, filter .8s ease;
}
.card:hover img{
  transform:scale(1.12) rotate(0.5deg);
  filter:brightness(1) contrast(1.25);
}
.card span{
  position:absolute; left:18px; bottom:18px; z-index:2;
  font-size:14px; letter-spacing:1px;
  text-shadow:0 1px 6px rgba(0,0,0,0.5);
}

/* FOOTER */
footer{padding:40px; text-align:center; color:#6b7376}

/* ANIM */
@keyframes fadeUp{from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo">SEEPURE</div>
  <nav>
    <a href="collections.html">Collections</a>
    <a href="#">Materials</a>
    <a href="#">Spaces</a>
    <a href="#">About</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slide active" style="background-image:url('images/hero-1.jpg')"></div>
  <div class="slide" style="background-image:url('images/hero-2.jpg')"></div>
  <div class="slide" style="background-image:url('images/hero-3.jpg')"></div>

  <div class="hero-content">
    <h1>SEEPURE</h1>
    <p>Natural Marble Objects for Contemporary Living</p>
  </div>
</section>

<!-- COLLECTIONS -->
<section class="section">
  <h2>Collections</h2>
  <div class="grid">
    <a href="dining.html" class="card"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=800&auto=format"><span>Dining</span></a>
    <a href="bath.html" class="card"><img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=800&auto=format"><span>Bath</span></a>
    <a href="living.html" class="card"><img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?w=800&auto=format"><span>Living</span></a>
    <a href="objects.html" class="card"><img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9?w=800&auto=format"><span>Objects</span></a>
  </div>
</section>

<!-- NEW -->
<section class="section">
  <h2>New Arrivals</h2>
  <div class="grid">
    <a href="product.html" class="card"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&auto=format"><span>Tray</span></a>
    <a href="product.html" class="card"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=800&auto=format"><span>Lamp</span></a>
    <a href="product.html" class="card"><img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?w=800&auto=format"><span>Dispenser</span></a>
  </div>
</section>

<footer>© 2026 Seepure</footer>

<script>
// scroll reveal
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
  const trigger=window.innerHeight*0.85;
  sections.forEach(s=>{ if(s.getBoundingClientRect().top<trigger){s.classList.add('visible')} })
});

// hero slider
const slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
  slides[i].classList.remove('active');
  i=(i+1)%slides.length;
  slides[i].classList.add('active');
},5000);
</script>

</body>
</html>
