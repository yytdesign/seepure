<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seepure</title>

<style>
:root{
  --bg:#0b0d0e;
  --card:#111416;
  --text:#ffffff;
  --muted:#a7b0b3;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  z-index:20;
  background:rgba(10,12,13,.45);
  backdrop-filter: blur(12px);
}
header nav a{
  margin-left:22px;
  color:#fff;
  text-decoration:none;
  font-size:13px;
}

/* HERO */
.hero{height:60vh; position:relative; overflow:hidden}
.slide{
  position:absolute; inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1s ease;
}
.slide.active{opacity:1}

/* HERO TEXT */
.hero-content{
  position:absolute; inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2;
}
.hero h1{font-size:48px;margin:0}
.hero p{color:#ccc}

/* SECTION */
.section{padding:80px 40px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  display:block; /* ✅关键 */
  position:relative;
  height:200px;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card span{
  position:absolute;
  bottom:20px;
  left:20px;
  z-index:2;
}

/* 遮罩不阻挡点击 */
.card::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.5),transparent);
  pointer-events:none; /* ✅关键 */
}

footer{
  padding:40px;
  text-align:center;
  color:#666;
}
</style>
</head>

<body>

<header>
  <div>SEEPURE</div>
  <nav>
    <a href="collections.html">Collections</a>
    <a href="collections.html">Collections</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <!-- ✅ 改成在线图片（保证一定显示） -->

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600')"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=1600')"></div>

  <div class="hero-content">
    <h1>SEEPURE</h1>
    <p>Marble Living Objects</p>
  </div>
</section>

<!-- COLLECTIONS -->
<section class="section">
  <h2>Collections</h2>

  <div class="grid">

    <a href="dining.html" class="card">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=800">
      <span style="color: #95a5a6;">Dining</span>
    </a>

    <a href="bath.html" class="card">
      <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=800">
      <span style="color: #95a5a6;">Bath</span>
    </a>

    <a href="living.html" class="card">
      <img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?w=800">
      <span style="color: #95a5a6;">Living</span>
    </a>

    <a href="objects.html" class="card">
      <img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9?w=800">
      <span style="color: #95a5a6;">Objects</span>
    </a>

  </div>
</section>

<!-- NEW -->
<section class="section">
  <h2>New Arrivals</h2>

  <div class="grid">

    <a href="product.html" class="card">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800">
      <span style="color: #95a5a6;">Tray</span>
    </a>

    <a href="product.html" class="card">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=800">
      <span style="color: #95a5a6;">Lamp</span>
    </a>

    <a href="product.html" class="card">
      <img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?w=800">

    </a>

  </div>
</section>

<footer>© 2026 SEEPURE ALL RIGHTS RESERVED</footer>

<script>
// HERO轮播（稳定版）
const slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
  slides[i].classList.remove('active');
  i=(i+1)%slides.length;
  slides[i].classList.add('active');
},4000);
</script>

</body>
</html>
